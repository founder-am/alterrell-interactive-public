/* ── DESIGN TOKENS ── */
:root {
  --teal: #0a7c72;
  --paper: #f8f6f1;
  --orange: #c95f1a;
  --ink: #111111;
  --ink-mid: #444444;
  --ink-muted: #888888;
  --border: #e0dcd4;
  --surface: #f0ede8;
  --teal-light: #e6f2f0;
  --teal-dark: #085044;
  --orange-light: #fdf0eb;
  --orange-dark: #7a3410;
  --white: #ffffff;
}

/* ── RESET + PAGE ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8e4de;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 48px;
}

/* ── SECTION LABELS (workbench only — not part of cards) ── */
.workbench-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #888;
  width: 100%;
  max-width: 400px;
  padding-bottom: 8px;
  border-bottom: 1px solid #ccc;
}

/* ══════════════════════════════════════════════════════════════
   SHARED CARD STYLES
   ══════════════════════════════════════════════════════════════ */

.card-square {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 7px solid var(--teal);
}

.card-tall {
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 7px solid var(--teal);
}

/* ── Typography ── */
.t-hero     { font-family: 'Spectral', serif; font-weight: 800; }
.t-section  { font-family: 'DM Serif Display', serif; }
.t-body     { font-family: 'DM Sans', sans-serif; }
.t-mono     { font-family: 'DM Mono', monospace; }

.comp-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.comp-tag.on-teal { color: rgba(248,246,241,.5); }

.editorial-line {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.4;
}
.editorial-line.on-teal { color: rgba(248,246,241,.85); }

.source-stamp {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: var(--ink-muted);
}
.source-stamp.on-teal { color: rgba(248,246,241,.5); }

.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: auto;
  padding-top: 8px;
}

<!-- ──────────────────────────────────────────────────────────────
     ALTERRELL INTERACTIVE — HEAD PARTIAL
     Extracted from concert-tax/index.html (golden reference), May 2026
     Paste these lines inside <head>...</head> in the new piece file.

     TOKEN SLOTS:
       {{PIECE_TITLE}}    — Display title of the piece (no suffix)
                            e.g. Female Musicians Earn Less But Share More
       {{PIECE_SLUG}}     — URL slug  e.g. concert-tax
       {{OG_TITLE}}       — OG/Twitter title (usually same as PIECE_TITLE)
       {{OG_DESCRIPTION}} — Meta description and OG/Twitter description (1–2 sentences)
       {{OG_IMAGE}}       — Full URL to OG image
                            e.g. https://interactive.alterrell.com/og/{{PIECE_SLUG}}.png
       {{OG_URL}}         — Full canonical URL
                            e.g. https://interactive.alterrell.com/{{PIECE_SLUG}}/
     ────────────────────────────────────────────────────────────── -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PIECE_TITLE}} — Alterrell Interactive</title>
  <meta name="description" content="{{OG_DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Alterrell Interactive">
  <meta property="og:title" content="{{OG_TITLE}} — Alterrell Interactive">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@alterrell">
  <meta name="twitter:title" content="{{OG_TITLE}} — Alterrell Interactive">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

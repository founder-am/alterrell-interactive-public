     ALTERRELL INTERACTIVE — SCRIPTS PARTIAL
     Extracted from concert-tax/index.html (golden reference), May 2026

     TOKEN SLOTS: none — tab switching, section floor nav, tab overflow
     detection, and copy-link are identical across all pieces.

     IDENTIFIERS THIS SCRIPT EXPECTS (must match your markup):
       #ct-tabs            — id on the .ai-tabs tab bar div
       .ai-tab             — class on each tab button (platform class, no change needed)
       .ct-snav-btn        — class on section floor nav buttons
       [data-goto]         — attribute on floor nav buttons pointing to tab IDs
       #ct-copy-link       — id on the Copy Link button
       #ct-copy-label      — id on the Copy Link label span
       #ct-copy-icon       — id on the Copy Link icon span

     If you replaced the ct- prefix with a piece-specific prefix, update
     the selectors below accordingly.
     ────────────────────────────────────────────────────────────── -->

<!-- ── 9. SCRIPTS ── -->
<script>
(function () {
  var tabs = Array.from(document.querySelectorAll('.ai-tab'));
  var tabBar = document.querySelector('#ct-tabs');
  var sections = tabs.map(function (tab) {
    return document.getElementById(tab.dataset.target);
  });

  function activateTab(targetId) {
    tabs.forEach(function (t) {
      var isActive = t.dataset.target === targetId;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-selected', String(isActive));
    });
    sections.forEach(function (s) {
      if (!s) return;
      s.classList.toggle('active', s.id === targetId);
    });
    // Scroll to top on tab switch
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Keep active tab in view on mobile
    var activeTab = tabs.find(function (t) { return t.dataset.target === targetId; });
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // Tab bar clicks
  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      activateTab(tab.dataset.target);
    });
  });

  // Section floor nav buttons
  document.querySelectorAll('.ct-snav-btn[data-goto]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      activateTab(btn.dataset.goto);
    });
  });

  // Remove fade mask when all tabs fit without scrolling
  function checkTabOverflow() {
    if (tabBar && tabBar.scrollWidth <= tabBar.clientWidth) {
      tabBar.classList.add('no-fade');
    } else if (tabBar) {
      tabBar.classList.remove('no-fade');
    }
  }
  checkTabOverflow();
  window.addEventListener('resize', checkTabOverflow);

  // Copy link button — uses window.location.href for piece-agnostic behavior
  var copyBtn = document.getElementById('ct-copy-link');
  var copyLabel = document.getElementById('ct-copy-label');
  if (copyBtn) {
    copyBtn.addEventListener('click', function () {
      var url = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function () {
          copyLabel.textContent = 'Copied!';
          copyBtn.classList.add('link-copied');
          setTimeout(function () {
            copyLabel.textContent = 'Copy Link';
            copyBtn.classList.remove('link-copied');
          }, 2000);
        });
      } else {
        var ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        copyLabel.textContent = 'Copied!';
        setTimeout(function () { copyLabel.textContent = 'Copy Link'; }, 2000);
      }
    });
  }
})();
</script>

<section id="tab-take-action" class="ai-section" role="tabpanel">
  <div class="ai-inner">

    <span class="ai-eyebrow">Take Action</span>

    <!-- Card gallery — action cards from card design session -->

      {{ACTION_CARD_1}}
      {{ACTION_CARD_2}}
      {{ACTION_CARD_3}}

       target="_blank" rel="noopener"
       class="ai-journey-path primary"
       aria-label="Watch {{PIECE_NAME}} on YouTube">

       target="_blank" rel="noopener"

       aria-label="Read the full argument on Substack">

      <div class="ai-journey-label">Read</div>

      <div class="ai-journey-cta">Substack &rarr;</div>
    </a>
    <a href="{{KOFI_URL}}"
       target="_blank" rel="noopener"

       aria-label="Support on Ko-fi">

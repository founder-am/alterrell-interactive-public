<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Intensity vs Revenue Per Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 2rem;
    }
    h1 {
      font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      font-size: 1.2rem;
      color: #1a1a1a;
      margin-bottom: 0.35rem;
      font-weight: 400;
    }
    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: 0.78rem;
      color: #555;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #chart {
      width: 900px;
      height: 520px;
      position: relative;
    }
    .tooltip {
      position: fixed;
      background: #1a1a1a;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.78rem;
      line-height: 1.55;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 100;
      max-width: 220px;
    }
    .tooltip strong { display: block; margin-bottom: 2px; font-size: 0.82rem; }
  </style>
</head>
<body>
  <h1>Production Intensity vs Revenue Per Show</h1>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#E8B923;"></div>
      Female artists
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#0a7c72;"></div>
      Male artists
    </div>
  </div>
  <div id="chart"></div>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const ARTISTS = [
      {name:"Taylor Swift",x:4,y:13.9,r:68000,gender:"female",genre:"Pop",tour:"Eras Tour"},
      {name:"Beyoncé",x:4,y:12.7,r:50000,gender:"female",genre:"R&B/Pop",tour:"Cowboy Carter"},
      {name:"P!nk",x:4,y:4.1,r:18000,gender:"female",genre:"Pop/Rock",tour:"Summer Carnival"},
      {name:"Adele",x:3,y:2.3,r:20000,gender:"female",genre:"Pop",tour:"Adele Live 2016"},
      {name:"Dua Lipa",x:3,y:2.4,r:13000,gender:"female",genre:"Pop",tour:"Radical Optimism"},
      {name:"Karol G",x:3,y:3.5,r:15000,gender:"female",genre:"Reggaeton",tour:"Mañana Será Bonito"},
      {name:"Sabrina Carpenter",x:4,y:1.1,r:11000,gender:"female",genre:"Pop",tour:"Short n Sweet"},
      {name:"Nicki Minaj",x:4,y:1.6,r:11000,gender:"female",genre:"Rap",tour:"Pink Friday 2"},
      {name:"Megan Thee Stallion",x:3,y:1.5,r:13000,gender:"female",genre:"Rap",tour:"Hot Girl Summer"},
      {name:"Doja Cat",x:3,y:1.5,r:12000,gender:"female",genre:"Rap/Pop",tour:"Scarlet Tour"},
      {name:"Justin Bieber",x:1,y:10.0,r:25000,gender:"male",genre:"Pop",tour:"Coachella 2026"},
      {name:"Drake",x:2,y:4.0,r:20000,gender:"male",genre:"Rap",tour:"It's All a Blur"},
      {name:"Ed Sheeran",x:1,y:3.6,r:22000,gender:"male",genre:"Pop",tour:"Mathematics Tour"},
      {name:"Post Malone",x:2,y:3.9,r:19000,gender:"male",genre:"Pop/Rap",tour:"Big Ass Stadium"},
      {name:"The Weeknd",x:2,y:3.1,r:18000,gender:"male",genre:"R&B/Pop",tour:"After Hours til Dawn"},
      {name:"Travis Scott",x:2,y:1.5,r:15000,gender:"male",genre:"Rap",tour:"Circus Maximus"},
      {name:"Kendrick Lamar",x:2,y:3.3,r:16000,gender:"male",genre:"Rap",tour:"Grand National"},
      {name:"Chris Brown",x:3,y:6.0,r:12000,gender:"male",genre:"R&B",tour:"Breezy Bowl XX"},
      {name:"Usher",x:4,y:2.5,r:10000,gender:"male",genre:"R&B",tour:"Past Present Future"},
      {name:"Rod Wave",x:1,y:1.5,r:13000,gender:"male",genre:"Rap",tour:"Nostalgia Tour"}
    ];

    const LABELED = new Set([
      "Taylor Swift","Beyoncé","Justin Bieber","Drake","Ed Sheeran",
      "Sabrina Carpenter","Nicki Minaj","Karol G"
    ]);

    const TIER_LABELS = {1:"Solo/Minimal",2:"Small Band",3:"Dancers+Band",4:"Full Theatrical"};

    const W = 900, H = 520;
    const M = { top: 36, right: 40, bottom: 72, left: 64 };
    const iW = W - M.left - M.right;
    const iH = H - M.top - M.bottom;

    const svg = d3.select('#chart').append('svg')
      .attr('width', W).attr('height', H);

    const g = svg.append('g').attr('transform', `translate(${M.left},${M.top})`);

    const xScale = d3.scaleLinear().domain([0.5, 4.5]).range([0, iW]);
    const yScale = d3.scaleLinear().domain([0, 15]).range([iH, 0]);

    const rExtent = d3.extent(ARTISTS, d => d.r);
    const rScale = d3.scaleLog().domain(rExtent).range([7, 28]);

    // Quadrant fills — midpoint x=2.5, y=7.5
    const mx = xScale(2.5), my = yScale(7.5);

    const quadrants = [
      { x: 0,  y: 0,  w: mx,      h: my,      fill: 'rgba(10,124,114,0.06)',  label: 'PROFIT KINGS',     lx: mx * 0.5,           ly: my * 0.5 },
      { x: mx, y: 0,  w: iW - mx, h: my,      fill: 'rgba(232,185,35,0.07)', label: 'LEGACY BUILDERS',  lx: mx + (iW-mx)*0.5,   ly: my * 0.5 },
      { x: 0,  y: my, w: mx,      h: iH - my, fill: 'rgba(200,200,200,0.06)',label: 'BUILDING',          lx: mx * 0.5,           ly: my + (iH-my)*0.5 },
      { x: mx, y: my, w: iW - mx, h: iH - my, fill: 'rgba(232,185,35,0.07)', label: 'THE UNDERCHARGERS', lx: mx + (iW-mx)*0.5,   ly: my + (iH-my)*0.5 },
    ];

    quadrants.forEach(q => {
      g.append('rect')
        .attr('x', q.x).attr('y', q.y)
        .attr('width', q.w).attr('height', q.h)
        .attr('fill', q.fill);

      g.append('text')
        .attr('x', q.lx).attr('y', q.ly)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('fill', '#c0c0c0')
        .attr('font-size', '9px')
        .attr('font-weight', '700')
        .attr('letter-spacing', '0.08em')
        .text(q.label);
    });

    // Grid lines
    g.append('g')
      .attr('transform', `translate(0,${iH})`)
      .call(d3.axisBottom(xScale)
        .tickValues([1,2,3,4])
        .tickFormat(d => TIER_LABELS[d])
        .tickSize(-iH))
      .call(ax => ax.select('.domain').remove())
      .call(ax => ax.selectAll('.tick line').attr('stroke','#e8e8e8').attr('stroke-dasharray','3,3'))
      .call(ax => ax.selectAll('.tick text')
        .attr('fill','#666').attr('font-size','11px').attr('dy','1.2em'));

    g.append('g')
      .call(d3.axisLeft(yScale)
        .ticks(6)
        .tickSize(-iW))
      .call(ax => ax.select('.domain').remove())
      .call(ax => ax.selectAll('.tick line').attr('stroke','#e8e8e8').attr('stroke-dasharray','3,3'))
      .call(ax => ax.selectAll('.tick text')
        .attr('fill','#666').attr('font-size','11px'));

    // Y axis label
    svg.append('text')
      .attr('transform', `rotate(-90)`)
      .attr('x', -(M.top + iH / 2))
      .attr('y', 16)
      .attr('text-anchor', 'middle')
      .attr('fill', '#888')
      .attr('font-size', '11px')
      .text('Revenue per show ($M)');

    // Tooltip
    const tip = document.getElementById('tooltip');

    function showTip(e, d) {
      tip.innerHTML = `<strong>${d.name}</strong>${d.tour}<br>${TIER_LABELS[d.x]}<br>$${d.y}M per show`;
      tip.style.opacity = 1;
      moveTip(e);
    }
    function moveTip(e) {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 10) + 'px';
    }
    function hideTip() { tip.style.opacity = 0; }

    // Dots
    const nodes = g.selectAll('.bubble')
      .data(ARTISTS)
      .join('circle')
        .attr('class', 'bubble')
        .attr('cx', d => xScale(d.x))
        .attr('cy', d => yScale(d.y))
        .attr('r',  d => rScale(d.r))
        .attr('fill', d => d.gender === 'female' ? 'rgba(232,185,35,0.55)' : 'rgba(10,124,114,0.55)')
        .attr('stroke', d => d.gender === 'female' ? '#E8B923' : '#0a7c72')
        .attr('stroke-width', 1.5)
        .style('cursor', 'pointer')
        .on('mouseover', (e, d) => {
          d3.select(e.currentTarget)
            .attr('fill', d.gender === 'female' ? 'rgba(232,185,35,0.85)' : 'rgba(10,124,114,0.85)');
          showTip(e, d);
        })
        .on('mousemove', moveTip)
        .on('mouseout', (e, d) => {
          d3.select(e.currentTarget)
            .attr('fill', d.gender === 'female' ? 'rgba(232,185,35,0.55)' : 'rgba(10,124,114,0.55)');
          hideTip();
        });

    // Labels
    const labelOffsets = {
      "Taylor Swift":    { dx: 0,   dy: -14 },
      "Beyoncé":         { dx: 0,   dy:  14 },
      "Justin Bieber":   { dx: 0,   dy: -14 },
      "Drake":           { dx: 14,  dy:   0 },
      "Ed Sheeran":      { dx: -14, dy:   0 },
      "Sabrina Carpenter":{ dx: 0,  dy:  14 },
      "Nicki Minaj":     { dx: 14,  dy:   0 },
      "Karol G":         { dx: 0,   dy: -14 },
    };

    g.selectAll('.blabel')
      .data(ARTISTS.filter(d => LABELED.has(d.name)))
      .join('text')
        .attr('class', 'blabel')
        .attr('x', d => xScale(d.x) + (labelOffsets[d.name]?.dx ?? 0))
        .attr('y', d => yScale(d.y) + (labelOffsets[d.name]?.dy ?? -12))
        .attr('text-anchor', d => {
          const dx = labelOffsets[d.name]?.dx ?? 0;
          return dx > 0 ? 'start' : dx < 0 ? 'end' : 'middle';
        })
        .attr('dominant-baseline', d => {
          const dy = labelOffsets[d.name]?.dy ?? 0;
          return dy > 0 ? 'hanging' : dy < 0 ? 'auto' : 'middle';
        })
        .attr('fill', '#1a1a1a')
        .attr('font-size', '10px')
        .attr('font-weight', '600')
        .text(d => d.name);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Alterrell Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,700;1,700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/alterrell-interactive.css">
  <style>
    .not-found-wrap {
      min-height: 100vh;
      background: var(--dark-section);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 1.25rem;
    }
    .not-found-inner {
      max-width: 1080px;
      margin: 0 auto;
      width: 100%;
    }
    .not-found-eyebrow {
      font-family: var(--font-mono);
      font-size: var(--text-stamp);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-light);
      margin-bottom: 1rem;
      display: block;
    }
    .not-found-headline {
      font-family: var(--font-display);
      font-size: clamp(3rem, 7.5vw, 7rem);
      font-weight: 700;
      font-style: italic;
      line-height: 1.0;
      color: var(--paper);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      white-space: nowrap;
    }
    .not-found-headline em { color: var(--teal-light); font-style: normal; }
    .not-found-sub {
      font-family: var(--font-editorial);
      font-style: italic;
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      color: rgba(248,246,241,0.45);
      margin-bottom: var(--space-lg);
      line-height: 1.4;
    }
    .not-found-link {
      font-family: var(--font-body);
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--teal-light);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      min-height: var(--touch);
      border: 1px solid rgba(13,148,136,0.3);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      transition: background 0.15s, border-color 0.15s;
    }
    .not-found-link:hover {
      background: rgba(13,148,136,0.1);
      border-color: var(--teal-light);
      text-decoration: none;
    }
    @media (max-width: 640px) {
      .not-found-headline { white-space: normal; font-size: clamp(2.6rem, 10vw, 4rem); }
    }
  </style>
</head>
<body>

<nav class="ai-nav" role="navigation">
  <a href="/" class="ai-nav-brand"><span>Alterrell</span>&nbsp;Interactive</a>
  <div class="ai-nav-meta">
    <a href="https://alterrell.substack.com/" target="_blank" rel="noopener">Substack</a>
    &nbsp;·&nbsp;
    <a href="https://www.youtube.com/@Alterrell" target="_blank" rel="noopener">YouTube</a>
  </div>
</nav>

<div class="not-found-wrap">
  <div class="not-found-inner">
    <span class="not-found-eyebrow">404 — Page not found</span>
    <h1 class="not-found-headline">This isn't the <em>architecture.</em></h1>
    <p class="not-found-sub">The data you're looking for doesn't live here.</p>
    <a href="/" class="not-found-link">← Back to the work</a>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serena - Option 2: Slate</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #0f1419;
            color: #ffffff;
            padding: 60px 40px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 50px;
        }
        
        .name-title {
            font-size: 4rem;
            font-weight: 700;
            color: #3dd9eb;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #7d8893;
            font-weight: 400;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .stat-box {
            background: #1a2028;
            border: 1px solid #2a3340;
            padding: 24px;
            border-radius: 4px;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #7d8893;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #3dd9eb;
        }
        
        .chart-container {
            background: #1a2028;
            border: 1px solid #2a3340;
            padding: 40px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        
        .branding {
            text-align: right;
            margin-top: 20px;
        }
        
        .brand-text {
            font-size: 0.85rem;
            color: #5a6572;
            font-weight: 500;
        }
        
        .brand-name {
            color: #3dd9eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="name-title">SERENA</h1>
            <p class="subtitle">Name popularity 1960–2019 | Sports</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Pre-Debut Avg</div>
                <div class="stat-value">145</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Peak (2001)</div>
                <div class="stat-value">1,976</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total</div>
                <div class="stat-value">52K</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Increase</div>
                <div class="stat-value">14x</div>
            </div>
        </div>
        
        <div class="chart-container">
            <canvas id="serenaChart"></canvas>
        </div>
        
        <div class="branding">
            <span class="brand-text">Data & Analysis: <span class="brand-name">obsidian futures</span></span>
        </div>
    </div>

    <script>
        // Using example data - would be replaced with actual Serena data
        const data = {
            years: [1960, 1961, 1962, 1963, 1964, 1965, 1966, 1967, 1968, 1969, 1970, 1971, 1972, 1973, 1974, 1975, 1976, 1977, 1978, 1979, 1980, 1981, 1982, 1983, 1984, 1985, 1986, 1987, 1988, 1989, 1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019],
            counts: [120, 115, 130, 125, 140, 135, 150, 145, 155, 160, 148, 142, 138, 152, 147, 155, 168, 175, 180, 185, 190, 195, 188, 192, 200, 198, 210, 215, 225, 240, 255, 280, 320, 380, 450, 580, 720, 890, 1120, 1450, 1780, 1976, 1850, 1720, 1590, 1480, 1350, 1280, 1150, 1090, 1020, 980, 920, 880, 840, 790, 750, 710, 680, 650]
        };
        
        const ctx = document.getElementById('serenaChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.years,
                datasets: [{
                    label: 'Babies Named Serena',
                    data: data.counts,
                    borderColor: '#3dd9eb',
                    backgroundColor: 'rgba(61, 217, 235, 0.1)',
                    borderWidth: 2.5,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.5,
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        enabled: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        border: {
                            display: false
                        },
                        ticks: {
                            color: '#5a6572',
                            font: {
                                size: 11
                            },
                            callback: function(value) {
                                return value.toLocaleString();
                            }
                        },
                        grid: {
                            color: '#2a3340',
                            drawTicks: false
                        }
                    },
                    x: {
                        border: {
                            display: false
                        },
                        ticks: {
                            color: '#5a6572',
                            font: {
                                size: 11
                            },
                            maxRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 12
                        },
                        grid: {
                            color: '#1f2933',
                            drawTicks: false
                        }
                    }
                }
            }
        });
        
        // Add vertical line for pro debut (1995)
        const debutYear = 1995;
        
        Chart.register({
            id: 'debutLine',
            afterDatasetsDraw: function(chart) {
                const ctx = chart.ctx;
                const xAxis = chart.scales.x;
                const yAxis = chart.scales.y;
                const x = xAxis.getPixelForValue(debutYear);
                
                ctx.save();
                ctx.strokeStyle = '#3dd9eb';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(x, yAxis.top);
                ctx.lineTo(x, yAxis.bottom);
                ctx.stroke();
                
                // Label
                ctx.fillStyle = '#3dd9eb';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('1995 Pro Debut', x, yAxis.top - 10);
                ctx.restore();
            }
        });
    </script>
</body>
</html>
